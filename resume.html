  <script>
  (function () {
    'use strict';

    var RESUME_DATA = {"name":"Vinh Chieu Truong","contact":{"email":"vctruong100@gmail.com","linkedin":"https://www.linkedin.com/in/vinh-truong-224b93279/","github":"https://github.com/vctruong100","location":"Southern California"},"education":[{"school":"University of California, Irvine","degree":"B.S. in Informatics","location":"Irvine, CA","dates":"09.2021 – 06.2025","coursework":["Project Management","Human-Computer Interaction","Data Visualization","Databases","Web Applications"]}],"experience":[{"title":"Full Stack Developer","company":"ICS Scheduling — University of California, Irvine","sponsor":"Lumen & Sandy","location":"Irvine, CA","dates":"09.2024 – 03.2025","duration":"22 weeks","bullets":["Built a Next.js/TypeScript web app with a React drag-and-drop calendar for module scheduling.","Developed RESTful Node.js/Express APIs backed by MongoDB Atlas to manage courses, user roles, classrooms, modules, and messaging.","Ran Agile sprints: delivered bi-weekly demos, managed Git feature branches, and iterated on Figma wireframes."]}],"projects":[{"name":"ClinSpark Master Schedule","caseStudy":"projects/clinspark-master-schedule/index.html","tech":["React","TypeScript","FastAPI","PostgreSQL","TailwindCSS"],"bullets":["Developed a production-deployed, full-stack scheduling platform for clinical trial e-source builders with real-time study tracking, Gantt chart visualization, role-based access control, and audit logging.","Built a React/TypeScript frontend with a FastAPI/PostgreSQL backend, implementing JWT authentication with HttpOnly cookies, edit-lock conflict prevention, and one-click Excel export workflows."]},{"name":"Tampermonkey Automation Suite","caseStudy":"projects/tampermonkey-automator/index.html","tech":["JavaScript","Tampermonkey","DOM Automation"],"bullets":["Developed browser automation scripts across ClinSpark, Florence eBinder, and Microsoft Teams, automating multi-step data-entry workflows, eLog signing, and meeting attendance tracking.","Built resilient DOM automation using localStorage state machines, MutationObserver, and virtual-scroll scanning, reducing routine workflow time by approximately 60–70%."]},{"name":"Fablix Movie DB Web Application","caseStudy":"projects/fablix-movie-db/index.html","tech":["Java","Tomcat","MySQL","REST APIs","AWS","jQuery"],"bullets":["Developed a full-stack movie database with secure login, full-text search, and auto-complete.","Set up AWS instances, MySQL, and Tomcat, optimizing performance for handling thousands of movies."]},{"name":"Spacetime Crawler","caseStudy":null,"tech":["Python"],"bullets":["Developed a web crawler optimized for the ICS server, focusing on efficient data gathering and analysis.","Implemented unique page detection, subdomain mapping, and content analysis for comprehensive site exploration."]}],"skills":[{"category":"Languages","items":["Python","Java","C++","JavaScript","TypeScript"]},{"category":"Frameworks","items":["React.js","FastAPI","Next.js","Node.js","Express","TailwindCSS"]},{"category":"Technologies","items":["REST APIs","PostgreSQL","MongoDB","MySQL","AWS","Tomcat","Cloudflare Pages","Render"]},{"category":"Tools","items":["Git","VS Code","Figma","Microsoft Excel","Google Workspace"]},{"category":"Additional","items":["Bilingual (English, Vietnamese)","Fast learner","Strong problem-solving","Adaptable under pressure"]}]};

    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function renderContact(contact) {
      var items = [
        '<li>' + esc(contact.location) + '</li>',
        '<li><a href="mailto:' + esc(contact.email) + '">' + esc(contact.email) + '</a></li>',
        '<li><a href="' + esc(contact.linkedin) + '" target="_blank" rel="noopener noreferrer">LinkedIn</a></li>',
        '<li><a href="' + esc(contact.github) + '" target="_blank" rel="noopener noreferrer">github.com/vctruong100</a></li>'
      ];
      return '<ul class="resume-header__contact">' + items.join('') + '</ul>';
    }

    function renderEducation(education) {
      var html = '<section class="resume-section" aria-labelledby="resume-education">';
      html += '<h2 class="resume-section__heading" id="resume-education">Education</h2>';
      for (var i = 0; i < education.length; i++) {
        var ed = education[i];
        html += '<div class="resume-entry">';
        html += '<div class="resume-entry__header">';
        html += '<span class="resume-entry__title">' + esc(ed.school) + '</span>';
        html += '<span class="resume-entry__meta">' + esc(ed.location) + ' &nbsp;|&nbsp; ' + esc(ed.dates) + '</span>';
        html += '</div>';
        html += '<div class="resume-entry__subtitle">' + esc(ed.degree) + '</div>';
        if (ed.coursework && ed.coursework.length) {
          html += '<div class="resume-entry__subtitle"><strong>Coursework:</strong> ' + ed.coursework.map(esc).join(', ') + '</div>';
        }
        html += '</div>';
      }
      html += '</section>';
      return html;
    }

    function renderExperience(experience) {
      var html = '<section class="resume-section" aria-labelledby="resume-experience">';
      html += '<h2 class="resume-section__heading" id="resume-experience">Experience</h2>';
      for (var i = 0; i < experience.length; i++) {
        var exp = experience[i];
        html += '<div class="resume-entry">';
        html += '<div class="resume-entry__header">';
        html += '<span class="resume-entry__title">' + esc(exp.title) + '</span>';
        html += '<span class="resume-entry__meta">' + esc(exp.location) + ' &nbsp;|&nbsp; ' + esc(exp.dates) + '</span>';
        html += '</div>';
        html += '<div class="resume-entry__subtitle">' + esc(exp.company) + (exp.duration ? ' (' + esc(exp.duration) + ')' : '') + '</div>';
        if (exp.bullets && exp.bullets.length) {
          html += '<ul class="resume-entry__bullets">';
          for (var j = 0; j < exp.bullets.length; j++) {
            html += '<li>' + esc(exp.bullets[j]) + '</li>';
          }
          html += '</ul>';
        }
        html += '</div>';
      }
      html += '</section>';
      return html;
    }

    function renderProjects(projects) {
      var html = '<section class="resume-section" aria-labelledby="resume-projects">';
      html += '<h2 class="resume-section__heading" id="resume-projects">Projects</h2>';
      for (var i = 0; i < projects.length; i++) {
        var proj = projects[i];
        html += '<div class="resume-entry">';
        html += '<div class="resume-entry__header">';
        var titleHtml = proj.caseStudy
          ? '<a href="' + esc(proj.caseStudy) + '">' + esc(proj.name) + '</a>'
          : esc(proj.name);
        html += '<span class="resume-entry__title">' + titleHtml + '</span>';
        html += '</div>';
        if (proj.tech && proj.tech.length) {
          html += '<div class="resume-entry__tech">';
          for (var t = 0; t < proj.tech.length; t++) {
            html += '<span>' + esc(proj.tech[t]) + '</span>';
          }
          html += '</div>';
        }
        if (proj.bullets && proj.bullets.length) {
          html += '<ul class="resume-entry__bullets">';
          for (var j = 0; j < proj.bullets.length; j++) {
            html += '<li>' + esc(proj.bullets[j]) + '</li>';
          }
          html += '</ul>';
        }
        html += '</div>';
      }
      html += '</section>';
      return html;
    }

    function renderSkills(skills) {
      var html = '<section class="resume-section" aria-labelledby="resume-skills">';
      html += '<h2 class="resume-section__heading" id="resume-skills">Skills</h2>';
      html += '<div class="resume-skills-grid">';
      for (var i = 0; i < skills.length; i++) {
        var skill = skills[i];
        html += '<div class="resume-skill-row">';
        html += '<span class="resume-skill-row__label">' + esc(skill.category) + ':</span>';
        html += '<span class="resume-skill-row__items">' + skill.items.map(esc).join(', ') + '</span>';
        html += '</div>';
      }
      html += '</div>';
      html += '</section>';
      return html;
    }

    function render(data) {
      var html = '';

      html += '<header class="resume-header">';
      html += '<h1 class="resume-header__name">' + esc(data.name) + '</h1>';
      html += renderContact(data.contact);
      html += '</header>';

      html += renderExperience(data.experience);
      html += renderProjects(data.projects);
      html += renderEducation(data.education);
      html += renderSkills(data.skills);

      var el = document.getElementById('resume-content');
      if (el) {
        el.innerHTML = html;
      }
    }

    function showError(msg) {
      var el = document.getElementById('resume-content');
      if (el) {
        el.innerHTML = '<p class="resume-error">' + esc(msg) + '</p>';
      }
    }

    render(RESUME_DATA);

  }());
  </script>
